<!DOCTYPE html>
<html lang="it">
<head>
<base target="_top">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>BASE — Disponibilità tavoli</title>

<style>
  :root{
    --bg: #0B0D10;
    --bg-elevated: #14171C;
    --bg-card: #1A1E24;
    --bg-input: #20242B;
    --line: #2A2F38;
    --line-bright: #3A4250;
    --text: #F2F3F5;
    --text-dim: #9CA3AF;
    --text-faint: #5A6270;
    --gold: #D4AF6A;
    --gold-dim: #8C744A;
    --gold-bg: rgba(212,175,106,0.13);
    --green: #5DCAA5;
    --green-bg: rgba(93,202,165,0.15);
    --red: #E0625F;
    --red-bg: rgba(224,98,95,0.14);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); height:100%;}
  body{font-size:15px; -webkit-font-smoothing:antialiased;}
  #root{min-height:100vh; display:flex; flex-direction:column;}
  button, input, select{font-family:inherit; font-size:inherit; color:inherit;}

  /* ---- login ---- */
  .login-wrap{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:24px;
  }
  .login-box{
    background:var(--bg-elevated); border:1px solid var(--line); border-radius:16px;
    padding:32px 28px; width:100%; max-width:380px;
  }
  .login-brand{
    display:flex; align-items:center; gap:10px; margin-bottom:28px; justify-content:center;
  }
  .brand-mark{
    width:36px; height:36px; border-radius:10px; background:var(--gold-bg); color:var(--gold);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px;
    border:1px solid var(--gold-dim);
  }
  .login-title{font-size:20px; font-weight:700;}
  .login-sub{font-size:12.5px; color:var(--text-dim); margin-top:2px; text-align:center;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11.5px; color:var(--text-dim); font-weight:700; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.4px;}
  .field input{
    width:100%; background:var(--bg-input); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; font-size:15px; outline:none; color:var(--text);
  }
  .field input:focus{border-color:var(--gold-dim);}
  .btn-login{
    width:100%; background:var(--gold); border:none; border-radius:11px; padding:13px;
    font-size:15px; font-weight:700; color:#1B1505; cursor:pointer; margin-top:6px;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-login:active{opacity:0.85;}
  .login-error{
    background:var(--red-bg); border:1px solid var(--red); border-radius:10px;
    padding:10px 14px; font-size:13px; color:var(--red); margin-top:14px; text-align:center;
  }

  /* ---- watermark ---- */
  .watermark{
    position:fixed; inset:0; pointer-events:none; z-index:9999;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .watermark-inner{
    transform:rotate(-35deg);
    display:flex; flex-direction:column; gap:40px; opacity:0.07;
    white-space:nowrap; user-select:none; -webkit-user-select:none;
  }
  .watermark-row{
    font-size:18px; font-weight:700; color:var(--text);
    letter-spacing:4px; text-transform:uppercase;
  }

  /* ---- topbar ---- */
  .topbar{
    display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line);
    background:var(--bg-elevated); position:sticky; top:0; z-index:30;
  }
  .event-select{
    background:transparent; border:none; color:var(--text); font-weight:700; font-size:16px; padding:4px 0;
    appearance:none; cursor:pointer;
  }
  .event-select:focus{outline:none;}
  .topbar .counts{display:flex; gap:14px; margin-left:auto; font-size:12.5px; color:var(--text-dim);}
  .topbar .counts b{color:var(--text); font-weight:700;}
  .topbar .dot{width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:5px;}

  /* ---- searchbar ---- */
  .searchbar{
    display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--bg-elevated);
    border-bottom:1px solid var(--line); position:sticky; top:53px; z-index:29;
  }
  .search-input-wrap{position:relative; flex:1;}
  .search-input-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-size:17px;}
  .search-input-wrap input{
    width:100%; background:var(--bg-input); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px 10px 36px; font-size:14.5px; outline:none; color:var(--text);
  }
  .search-input-wrap input:focus{border-color:var(--gold-dim);}
  .search-input-wrap .clear-x{
    position:absolute; right:8px; top:50%; transform:translateY(-50%); width:22px; height:22px; border:none;
    background:var(--line-bright); border-radius:50%; color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }

  /* ---- content ---- */
  .content{flex:1; padding:14px 16px 100px; max-width:900px; width:100%; margin:0 auto; overflow-x:hidden;}
  .zone-block{margin-bottom:20px;}
  .zone-title{font-size:11.5px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.8px; margin:0 0 8px 2px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px;}
  .card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:10px 11px;
    min-height:74px; display:flex; flex-direction:column; justify-content:space-between;
  }
  .card.libero{opacity:0.55;}
  .card.prenotato{border-color:rgba(212,175,106,0.4);}
  .card.arrivato{border-color:rgba(93,202,165,0.5); background:linear-gradient(180deg, rgba(93,202,165,0.07), transparent 45%), var(--bg-card);}
  .card.noshow{border-color:rgba(224,98,95,0.5); background:linear-gradient(180deg, rgba(224,98,95,0.08), transparent 45%), var(--bg-card);}
  .card.card-grouped{border-style:dashed; border-width:1.5px;}
  .card-top{display:flex; align-items:center; justify-content:space-between;}
  .card-num{font-size:15px; font-weight:700;}
  .status-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .status-dot.libero{background:var(--text-faint);}
  .status-dot.prenotato{background:var(--gold);}
  .status-dot.arrivato{background:var(--green);}
  .status-dot.noshow{background:var(--red);}
  .card-name{font-size:13px; font-weight:600; margin-top:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .card-name.empty{color:var(--text-faint); font-weight:400; font-style:italic;}
  .card-sub{font-size:11.5px; color:var(--text-dim); margin-top:2px; display:flex; align-items:center; gap:4px;}
  .group-badge{width:8px; height:8px; display:flex; align-items:center; justify-content:center; color:#6FA8E0; font-size:11px; flex-shrink:0;}
  .legend{display:flex; gap:14px; padding:0 2px 14px; font-size:11.5px; color:var(--text-dim); flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .empty-state{text-align:center; padding:50px 20px; color:var(--text-faint);}
  .empty-state svg{font-size:34px; display:block; margin-bottom:10px; color:var(--line-bright);}
  .empty-state .t{font-size:14px; font-weight:600; color:var(--text-dim); margin-bottom:3px;}
  .empty-state .s{font-size:12.5px;}

  @keyframes icon-spin{ from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @media(max-width:420px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
    .content{padding:12px 12px 100px;}
  }
</style>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const ICON_PATHS = {
  'alert-triangle': '<path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/>',
  'check': '<path d="M20 6 9 17l-5-5"/>',
  'coin': '<circle cx="12" cy="12" r="9"/><path d="M14.8 9a2 2 0 0 0-1.8-1H11a2 2 0 1 0 0 4h2a2 2 0 1 1 0 4h-2a2 2 0 0 1-1.8-1M12 6v2M12 16v2"/>',
  'calendar-plus': '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18M12 15v6M9 18h6"/>',
  'link': '<path d="M9 15 15 9M11 6.5l1-1a4 4 0 1 1 5.5 5.5l-1 1M13 17.5l-1 1a4 4 0 1 1-5.5-5.5l1-1"/>',
  'loader-2': '<path d="M12 3a9 9 0 1 0 9 9"/>',
  'lock': '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/>',
  'search': '<circle cx="10" cy="10" r="7"/><path d="m21 21-5.5-5.5"/>',
  'search-off': '<circle cx="10" cy="10" r="7"/><path d="m21 21-5.5-5.5M3 3l18 18"/>',
  'users': '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
  'x': '<path d="M18 6 6 18M6 6l12 12"/>',
};

function Icon({name, style}){
  const path = ICON_PATHS[name];
  if(!path) return null;
  const spin = name === 'loader-2';
  return (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
      strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"
      style={{width:'1em', height:'1em', display:'inline-block', verticalAlign:'-0.125em', flexShrink:0,
        animation: spin ? 'icon-spin 0.8s linear infinite' : undefined, ...style}}
      dangerouslySetInnerHTML={{__html: path}} />
  );
}

const ZONES = [
  { key: 'Zona 200', tables: [201,202,203,204,205,206,207,208,209] },
  { key: 'Zona 200B', tables: [210,211,212,213,214,215,216,217,218,219,220,221,222,223] },
  { key: 'Zona 100', tables: [101,102,103,104,105,106,107,108,109,110,111,112,113,114,115,116,117,118,119,120,121,122,123,124,125] },
  { key: 'Zona 100B', tables: [126,127,128] },
];
const ALL_TABLE_NUMS = ZONES.flatMap(z => z.tables);

function status(t){
  if(!t.nome) return 'libero';
  if(t.noShow) return 'noshow';
  return t.arrivato ? 'arrivato' : 'prenotato';
}
function fmtEUR(n){
  return new Intl.NumberFormat('it-IT',{style:'currency', currency:'EUR', maximumFractionDigits:0}).format(n||0);
}
function fmtDateLabel(iso){
  try{
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('it-IT', {weekday:'short', day:'2-digit', month:'short'});
  }catch(e){ return iso; }
}
function getDispositivo(){
  // ID stabile per questo browser, salvato una sola volta. Non dipende da
  // fuso orario, risoluzione o versione del browser (tutti valori volatili
  // che cambiano con viaggi, monitor esterni o aggiornamenti di Chrome, e
  // che prima facevano sospendere l'account per errore). Resta invariato
  // finché l'utente non cancella i dati del browser.
  let id = localStorage.getItem('base_device_id');
  if(!id){
    id = 'dev_' + (window.crypto && crypto.randomUUID
      ? crypto.randomUUID()
      : Date.now() + '_' + Math.random().toString(36).slice(2));
    localStorage.setItem('base_device_id', id);
  }
  return id;
}
// ⬇️ INCOLLA QUI l'URL della Web App del progetto Apps Script della VISTA PR
// (Implementa → Nuova implementazione → App web → copia l'URL che finisce con /exec)
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyN8Yl67td6TqBi_CjKl3oKSZEDEcjF9VGh5NnUCxGjHqYqaSNjJGHMTVgJfu2ccrwzsw/exec';

// credenziali del login corrente, da passare alle chiamate protette
function creds(){
  return [sessionStorage.getItem('base_username'), sessionStorage.getItem('base_token')];
}

async function callServer(fn, ...args){
  // POST "semplice": NON impostiamo header Content-Type, così il browser NON
  // fa la richiesta di preflight OPTIONS — che Apps Script non sa gestire e
  // che romperebbe il CORS. Il corpo è JSON in una stringa di testo semplice.
  const res = await fetch(BACKEND_URL, {
    method: 'POST',
    body: JSON.stringify({ fn: fn, args: args }),
  });
  if(!res.ok) throw new Error('Errore di rete (' + res.status + ')');
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Errore server');
  return json.data;
}

/* ---- FACE ID / IMPRONTA (WebAuthn) ----
 * Sblocco biometrico locale: dopo il primo login con password, il PR può
 * registrare una credenziale biometrica su QUESTO dispositivo. La chiave
 * privata resta nel secure enclave del telefono; lo sblocco richiede il
 * volto/impronta reali. Il token di sessione viene rivelato solo dopo che
 * la biometria è passata. Tutto lato browser: nessuna modifica al backend. */
async function faceIdDisponibile(){
  try{
    return !!(window.PublicKeyCredential
      && await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
  }catch(e){ return false; }
}
function _b64(buf){ return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))); }
function _unb64(s){ return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function registraFaceId(username, token){
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: 'BASE' },
      user: {
        id: new TextEncoder().encode(username || 'utente'),
        name: username || 'utente',
        displayName: username || 'utente',
      },
      pubKeyCredParams: [{ type:'public-key', alg:-7 }, { type:'public-key', alg:-257 }],
      authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
      timeout: 60000,
    }
  });
  localStorage.setItem('base_fid_cred', _b64(cred.rawId));
  localStorage.setItem('base_fid_user', username);
  localStorage.setItem('base_fid_token', token);
}

async function sbloccaFaceId(){
  const credId = localStorage.getItem('base_fid_cred');
  if(!credId) throw new Error('nessuna credenziale');
  await navigator.credentials.get({
    publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ type:'public-key', id:_unb64(credId) }],
      userVerification: 'required',
      timeout: 60000,
    }
  });
  return { username: localStorage.getItem('base_fid_user'), token: localStorage.getItem('base_fid_token') };
}
function dimenticaFaceId(){
  localStorage.removeItem('base_fid_cred');
  localStorage.removeItem('base_fid_user');
  localStorage.removeItem('base_fid_token');
}

/* ---- WATERMARK ---- */
function Watermark({nome}){
  const label = nome.toUpperCase();
  const rows = Array(8).fill(null);
  return (
    <div className="watermark">
      <div className="watermark-inner">
        {rows.map((_, i) => (
          <div className="watermark-row" key={i}>
            {label} &bull; {label} &bull; {label} &bull; {label} &bull; {label}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---- LOGIN ---- */
function LoginScreen({onLogin}){
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [hasFaceId, setHasFaceId] = useState(false); // credenziale salvata su questo device
  const [faceAvail, setFaceAvail] = useState(false); // il device supporta la biometria
  const [pending, setPending] = useState(null);      // {nome,isAdmin} in attesa della scelta "attiva Face ID?"
  const [fidBusy, setFidBusy] = useState(false);
  const [showPassword, setShowPassword] = useState(false); // mostra il form password al posto di Face ID
  const autoTried = React.useRef(false);

  useEffect(()=>{
    setHasFaceId(!!localStorage.getItem('base_fid_cred'));
    faceIdDisponibile().then(setFaceAvail);
  }, []);

  // al ritorno, se il Face ID è salvato prova a farlo partire da solo.
  // Su Android parte liscio; su iPhone Apple richiede un tocco, quindi in
  // caso di blocco resta semplicemente il bottone (nessun errore mostrato).
  useEffect(()=>{
    if(hasFaceId && !autoTried.current){
      autoTried.current = true;
      accediConFaceId(true);
    }
  }, [hasFaceId]);

  function salvaSessione(u, token, nome, isAdmin){
    sessionStorage.setItem('base_token', token);
    sessionStorage.setItem('base_username', u);
    sessionStorage.setItem('base_nome', nome);
    sessionStorage.setItem('base_isAdmin', isAdmin ? '1' : '0');
  }

  async function handleLogin(){
    if(!username.trim() || !password.trim()){ setError('Inserisci username e password'); return; }
    setLoading(true);
    setError('');
    try{
      const dispositivo = getDispositivo();
      const result = await callServer('apiLogin', username.trim(), password.trim(), dispositivo);
      if(result.ok){
        salvaSessione(username.trim().toLowerCase(), result.token, result.nome, result.isAdmin);
        // se il device supporta la biometria e non è ancora attivata, proponila
        if(faceAvail && !localStorage.getItem('base_fid_cred')){
          setPending({ nome: result.nome, isAdmin: result.isAdmin });
        } else {
          onLogin(result.nome, result.isAdmin);
        }
      } else if(result.bloccato){
        setError('Accesso non autorizzato — questo account è già attivo su un altro dispositivo.');
      } else {
        setError('Username o password errati.');
      }
    }catch(err){
      setError('Errore di connessione: ' + err.message);
    }finally{
      setLoading(false);
    }
  }

  // sblocco con Face ID: biometria → verifica token sul server → entra.
  // silent=true (auto-avvio): se fallisce non mostra errori, resta il bottone.
  async function accediConFaceId(silent){
    setFidBusy(true); setError('');
    try{
      const { username: u, token } = await sbloccaFaceId();
      const result = await callServer('apiVerifyToken', u, token, getDispositivo());
      if(result.valid){
        salvaSessione(u, token, result.nome, result.isAdmin);
        onLogin(result.nome, result.isAdmin);
      } else {
        dimenticaFaceId();
        setHasFaceId(false);
        setShowPassword(true);
        setError('Sessione scaduta: rifai l\'accesso con la password.');
      }
    }catch(err){
      if(!silent) setError('Face ID non riuscito. Usa la password.');
    }finally{
      setFidBusy(false);
    }
  }

  async function attivaFaceId(){
    setFidBusy(true); setError('');
    try{
      await registraFaceId(sessionStorage.getItem('base_username'), sessionStorage.getItem('base_token'));
    }catch(err){
      // se l'utente annulla o fallisce, entra comunque: il Face ID è opzionale
    }finally{
      setFidBusy(false);
      onLogin(pending.nome, pending.isAdmin);
    }
  }

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-brand">
          <div className="brand-mark">B</div>
          <div>
            <div className="login-title">BASE</div>
            <div className="login-sub">Disponibilità tavoli</div>
          </div>
        </div>

        {pending ? (
          <React.Fragment>
            <div style={{fontSize:14, color:'var(--text-dim)', textAlign:'center', margin:'4px 0 18px'}}>
              Vuoi entrare con <b style={{color:'var(--text)'}}>Face ID / impronta</b> nei prossimi accessi, senza ridigitare la password?
            </div>
            <button className="btn-login" onClick={attivaFaceId} disabled={fidBusy}>
              {fidBusy ? <Icon name="loader-2" /> : <Icon name="lock" />}
              {fidBusy ? 'Attivazione…' : 'Attiva Face ID'}
            </button>
            <button onClick={()=>onLogin(pending.nome, pending.isAdmin)}
              style={{width:'100%', background:'transparent', border:'none', color:'var(--text-dim)', padding:'12px', marginTop:6, cursor:'pointer', fontSize:13}}>
              Non ora
            </button>
            {error && <div className="login-error">{error}</div>}
          </React.Fragment>
        ) : (hasFaceId && !showPassword) ? (
          <React.Fragment>
            <div style={{fontSize:13, color:'var(--text-dim)', textAlign:'center', margin:'2px 0 16px'}}>
              Sblocca con il tuo volto o la tua impronta
            </div>
            <button className="btn-login" onClick={()=>accediConFaceId(false)} disabled={fidBusy}>
              {fidBusy ? <Icon name="loader-2" /> : <Icon name="lock" />}
              {fidBusy ? 'Verifica…' : 'Accedi con Face ID'}
            </button>
            <button onClick={()=>{ setError(''); setShowPassword(true); }}
              style={{width:'100%', background:'transparent', border:'none', color:'var(--text-dim)', padding:'12px', marginTop:6, cursor:'pointer', fontSize:13}}>
              Usa la password
            </button>
            {error && <div className="login-error">{error}</div>}
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="field">
              <label>Username</label>
              <input value={username} onChange={e=>setUsername(e.target.value)}
                placeholder="Il tuo username" autoCapitalize="none" autoCorrect="off" />
            </div>
            <div className="field">
              <label>Password</label>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
                placeholder="••••••••"
                onKeyDown={e=>e.key==='Enter' && handleLogin()} />
            </div>
            <button className="btn-login" onClick={handleLogin} disabled={loading}>
              {loading ? <Icon name="loader-2" /> : <Icon name="lock" />}
              {loading ? 'Accesso in corso…' : 'Accedi'}
            </button>
            {hasFaceId && (
              <button onClick={()=>{ setError(''); setShowPassword(false); }}
                style={{width:'100%', background:'transparent', border:'none', color:'var(--text-dim)', padding:'12px', marginTop:6, cursor:'pointer', fontSize:13}}>
                ← Torna a Face ID
              </button>
            )}
            {error && <div className="login-error">{error}</div>}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

/* ---- APP PRINCIPALE ---- */
function App(){
  const [authState, setAuthState] = useState('checking'); // checking | login | ok
  const [nomeUtente, setNomeUtente] = useState('');
  const [loading, setLoading] = useState(false);
  const [events, setEvents] = useState([]);
  const [currentEventId, setCurrentEventId] = useState(null);
  const [currentEvent, setCurrentEvent] = useState(null);
  const [query, setQuery] = useState('');

  useEffect(()=>{
    // controlla se c'è già una sessione valida
    const token = sessionStorage.getItem('base_token');
    const username = sessionStorage.getItem('base_username');
    const nome = sessionStorage.getItem('base_nome');
    const isAdmin = sessionStorage.getItem('base_isAdmin') === '1';

    if(token && username && nome){
      const dispositivo = getDispositivo();
      callServer('apiVerifyToken', username, token, dispositivo).then(result => {
        if(result.valid){
          setNomeUtente(result.nome);
          setAuthState('ok');
          loadData();
        } else {
          sessionStorage.clear();
          setAuthState('login');
        }
      }).catch(()=>{ setAuthState('login'); });
    } else {
      setAuthState('login');
    }
  }, []);

  async function loadData(){
    try{
      const data = await callServer('apiGetPublicBootstrap', ...creds());
      const sorted = data.events.slice().sort((a,b)=> a.date.localeCompare(b.date));
      setEvents(sorted);
      if(sorted.length > 0){
        const todayStr = new Date().toISOString().slice(0,10);
        const next = sorted.find(e => e.date >= todayStr) || sorted[sorted.length-1];
        const ev = await callServer('apiGetPublicEvent', next.id, ...creds());
        setCurrentEventId(next.id);
        setCurrentEvent(ev);
      }
    }catch(err){}
  }

  useEffect(()=>{
    if(authState !== 'ok' || !currentEventId) return;
    const interval = setInterval(async()=>{
      try{
        const ev = await callServer('apiGetPublicEvent', currentEventId, ...creds());
        setCurrentEvent(ev);
      }catch(err){}
    }, 8000);
    return ()=>clearInterval(interval);
  }, [authState, currentEventId]);

  async function switchEvent(id){
    setQuery('');
    if(id === currentEventId) return;
    const ev = await callServer('apiGetPublicEvent', id, ...creds());
    setCurrentEventId(id);
    setCurrentEvent(ev);
  }

  function handleLogin(nome){
    setNomeUtente(nome);
    setAuthState('ok');
    loadData();
  }

  if(authState === 'checking'){
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', color:'var(--text-dim)', fontSize:14}}>
        <Icon name="loader-2" style={{fontSize:22, marginRight:8}} />Caricamento…
      </div>
    );
  }

  if(authState === 'login'){
    return <LoginScreen onLogin={handleLogin} />;
  }

  const evTables = currentEvent ? currentEvent.tables : {};
  const occ = Object.values(evTables).filter(t => t.nome).length;
  const arr = Object.values(evTables).filter(t => t.arrivato).length;

  return (
    <div>
      <Watermark nome={nomeUtente} />

      <div className="topbar">
        <div className="brand-mark" style={{width:30, height:30, borderRadius:8, background:'var(--gold-bg)', color:'var(--gold)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:14, border:'1px solid var(--gold-dim)'}}>B</div>
        <select className="event-select" value={currentEventId || ''} onChange={e=>switchEvent(e.target.value)}>
          {events.map(ev => <option key={ev.id} value={ev.id}>{fmtDateLabel(ev.date)}</option>)}
        </select>
        <div className="counts">
          <span><span className="dot" style={{background:'var(--gold)'}}></span><b>{occ}</b>/{ALL_TABLE_NUMS.length}</span>
          <span><span className="dot" style={{background:'var(--green)'}}></span><b>{arr}</b> arrivati</span>
        </div>
      </div>

      <div className="searchbar">
        <div className="search-input-wrap">
          <Icon name="search" />
          <input placeholder="Cerca tavolo o nome…" value={query} onChange={e=>setQuery(e.target.value)} />
          {query && <button className="clear-x" onClick={()=>setQuery('')}><Icon name="x" style={{fontSize:13}} /></button>}
        </div>
      </div>

      <div className="content">
        {currentEvent && <PublicTavoliView evTables={evTables} query={query} />}
      </div>

      <div style={{textAlign:'center', padding:'24px 16px 40px', fontSize:11.5, color:'var(--text-faint)'}}>
        Vista di sola consultazione · {nomeUtente}
      </div>
    </div>
  );
}

function PublicTavoliView({evTables, query}){
  const q = query.trim().toLowerCase();
  const matches = (t, num) => {
    if(!q) return true;
    return String(num).includes(q) || (t.nome && t.nome.toLowerCase().includes(q));
  };
  const seenGroups = new Set();
  const anyMatch = ZONES.some(z => z.tables.some(num => evTables[num] && matches(evTables[num], num)));

  if(q && !anyMatch){
    return (
      <div className="empty-state">
        <Icon name="search-off" />
        <div className="t">Nessun tavolo trovato</div>
        <div className="s">Controlla il nome o il numero</div>
      </div>
    );
  }

  return (
    <React.Fragment>
      <div className="legend">
        <span><span className="status-dot libero"></span>Libero</span>
        <span><span className="status-dot prenotato"></span>Prenotato</span>
        <span><span className="status-dot arrivato"></span>Arrivato</span>
        <span><span className="status-dot noshow"></span>No-show</span>
      </div>
      {ZONES.map(z => {
        const visible = z.tables.filter(num => evTables[num] && matches(evTables[num], num));
        if(visible.length === 0) return null;
        return (
          <div className="zone-block" key={z.key}>
            <div className="zone-title">{z.key}</div>
            <div className="grid">
              {visible.map(num => {
                const r = evTables[num];
                if(!r) return null;
                if(r.gruppoId){
                  if(seenGroups.has(r.gruppoId)) return null;
                  seenGroups.add(r.gruppoId);
                }
                const groupNums = r.gruppoId
                  ? ALL_TABLE_NUMS.filter(n => evTables[n] && evTables[n].gruppoId === r.gruppoId).sort((a,b)=>a-b)
                  : [num];
                const minimoVisualizzato = groupNums.length > 1
                  ? groupNums.reduce((s,n) => s + (Number(evTables[n] ? evTables[n].minimo : 0)||0), 0)
                  : r.minimo;
                const st = status(r);
                return (
                  <div key={num} className={"card " + st + (groupNums.length > 1 ? ' card-grouped' : '')}>
                    <div className="card-top">
                      <span className="card-num">{groupNums.join(' + ')}</span>
                      {groupNums.length > 1
                        ? <span className="group-badge"><Icon name="link" /></span>
                        : <span className={"status-dot " + st}></span>}
                    </div>
                    <div className={"card-name" + (!r.nome ? ' empty':'')}>
                      {r.nome || 'Libero'}
                    </div>
                    <div className="card-sub">
                      <Icon name="coin" style={{fontSize:13}} />
                      min {fmtEUR(minimoVisualizzato)}
                      {groupNums.length > 1 && ' totali'}
                    </div>
                    {r.nome && (
                      <div className="card-sub">
                        <Icon name="users" style={{fontSize:13}} />
                        {r.arrivato && r.personeArrivate !== null ? r.personeArrivate : r.persone || '—'} persone
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
// Registra il service worker: rende l'app installabile (icona + schermo intero)
// e ne velocizza l'avvio. Non intercetta le chiamate al backend Apps Script.
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
