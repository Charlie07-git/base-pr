<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>BASE — Sala</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B0D10" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BASE Sala" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --bg:#0B0D10; --bg-elevated:#14171C; --bg-card:#1A1E24; --bg-input:#20242B;
    --line:#2A2F38; --line-bright:#3A4250;
    --text:#F2F3F5; --text-dim:#9CA3AF; --text-faint:#5A6270;
    --gold:#D4AF6A; --gold-dim:#8C744A; --gold-bg:rgba(212,175,106,0.13);
    --green:#5DCAA5; --green-bg:rgba(93,202,165,0.15);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); height:100%;}
  body{font-size:15px; -webkit-font-smoothing:antialiased;}
  #root{min-height:100vh; display:flex; flex-direction:column;}
  button,input,select{font-family:inherit; font-size:inherit; color:inherit;}

  /* login */
  .login-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px;}
  .login-box{background:var(--bg-elevated); border:1px solid var(--line); border-radius:16px; padding:32px 28px; width:100%; max-width:360px;}
  .login-brand{display:flex; align-items:center; gap:10px; margin-bottom:26px; justify-content:center;}
  .brand-mark{width:36px; height:36px; border-radius:10px; background:var(--gold-bg); color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; border:1px solid var(--gold-dim);}
  .login-title{font-size:20px; font-weight:700;}
  .login-sub{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
  .field label{display:block; font-size:11.5px; color:var(--text-dim); font-weight:700; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.4px;}
  .field input{width:100%; background:var(--bg-input); border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:16px; outline:none; color:var(--text);}
  .field input:focus{border-color:var(--gold-dim);}
  .btn-login{width:100%; background:var(--gold); border:none; border-radius:11px; padding:13px; font-size:15px; font-weight:700; color:#1B1505; cursor:pointer; margin-top:16px; display:flex; align-items:center; justify-content:center; gap:8px;}
  .btn-login:active{opacity:0.85;}
  .login-error{background:rgba(224,98,95,0.14); border:1px solid #E0625F; border-radius:10px; padding:10px 14px; font-size:13px; color:#E0625F; margin-top:14px; text-align:center;}

  /* topbar */
  .topbar{display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--line); background:var(--bg-elevated); position:sticky; top:0; z-index:30;}
  .event-select{background:transparent; border:none; color:var(--text); font-weight:700; font-size:16px; padding:4px 0; appearance:none; cursor:pointer;}
  .event-select:focus{outline:none;}

  /* stat bar */
  .stats{display:flex; gap:8px; padding:10px 16px; background:var(--bg-elevated); border-bottom:1px solid var(--line); position:sticky; top:53px; z-index:29;}
  .stat{flex:1; background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:8px 10px; text-align:center;}
  .stat .v{font-size:19px; font-weight:800;}
  .stat .l{font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.4px; margin-top:1px;}
  .stat.gold .v{color:var(--gold);}
  .stat.green .v{color:var(--green);}

  /* search */
  .searchbar{padding:10px 16px 0;}
  .search-wrap{position:relative;}
  .search-wrap input{width:100%; background:var(--bg-input); border:1px solid var(--line); border-radius:10px; padding:10px 12px 10px 36px; font-size:15px; outline:none; color:var(--text);}
  .search-wrap input:focus{border-color:var(--gold-dim);}
  .search-wrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-faint);}
  .clear-x{position:absolute; right:8px; top:50%; transform:translateY(-50%); width:22px; height:22px; border:none; background:var(--line-bright); border-radius:50%; color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;}

  /* content */
  .content{flex:1; padding:12px 16px 90px; max-width:900px; width:100%; margin:0 auto;}
  .zone-title{font-size:11.5px; font-weight:700; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.8px; margin:16px 0 8px 2px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px;}
  .card{background:var(--bg-card); border:1px solid rgba(93,202,165,0.45); border-radius:14px; padding:12px 13px;
        background-image:linear-gradient(180deg, rgba(93,202,165,0.08), transparent 42%);}
  .card-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
  .card-num{font-size:17px; font-weight:800; letter-spacing:0.3px;}
  .card-people{display:flex; align-items:center; gap:4px; background:var(--green-bg); color:var(--green); font-weight:800; font-size:14px; padding:3px 9px; border-radius:999px;}
  .card-name{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .card-min{display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text-dim); margin-top:6px;}
  .card-min b{color:var(--gold); font-weight:800; font-size:15px;}

  .empty{text-align:center; padding:60px 20px; color:var(--text-faint);}
  .empty svg{display:block; margin:0 auto 12px; color:var(--line-bright);}
  .empty .t{font-size:15px; font-weight:600; color:var(--text-dim); margin-bottom:4px;}
  .empty .s{font-size:13px;}

  @keyframes spin{from{transform:rotate(0)} to{transform:rotate(360deg)}}
  @media(max-width:420px){ .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyN8Yl67td6TqBi_CjKl3oKSZEDEcjF9VGh5NnUCxGjHqYqaSNjJGHMTVgJfu2ccrwzsw/exec';

const ZONES = [
  { key:'Zona 200',  tables:[201,202,203,204,205,206,207,208,209] },
  { key:'Zona 200B', tables:[210,211,212,213,214,215,216,217,218,219,220,221,222,223] },
  { key:'Zona 100',  tables:[101,102,103,104,105,106,107,108,109,110,111,112,113,114,115,116,117,118,119,120,121,122,123,124,125] },
  { key:'Zona 100B', tables:[126,127,128] },
];
const ALL_TABLE_NUMS = ZONES.reduce((a,z)=>a.concat(z.tables),[]);

const ICONS = {
  lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 1 1 8 0v4"/>',
  loader:'<path d="M12 3a9 9 0 1 0 9 9"/>',
  search:'<circle cx="10" cy="10" r="7"/><path d="m21 21-5.5-5.5"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  users:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>',
  coin:'<circle cx="12" cy="12" r="9"/><path d="M14.8 9a2 2 0 0 0-1.8-1H11a2 2 0 1 0 0 4h2a2 2 0 1 1 0 4h-2a2 2 0 0 1-1.8-1M12 6v2M12 16v2"/>',
  inbox:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/>',
};
function Icon({name, style}){
  const p = ICONS[name]; if(!p) return null;
  const spin = name==='loader';
  return (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    style={{width:'1em', height:'1em', display:'inline-block', verticalAlign:'-0.125em', flexShrink:0, animation: spin?'spin 0.8s linear infinite':undefined, ...style}}
    dangerouslySetInnerHTML={{__html:p}} />);
}

async function callServer(fn, ...args){
  const res = await fetch(BACKEND_URL, { method:'POST', body: JSON.stringify({ fn, args }) });
  if(!res.ok) throw new Error('Errore di rete (' + res.status + ')');
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || 'Errore server');
  return json.data;
}

function fmtEUR(n){ return new Intl.NumberFormat('it-IT',{style:'currency', currency:'EUR', maximumFractionDigits:0}).format(n||0); }
function fmtDate(iso){ try{ return new Date(iso+'T00:00:00').toLocaleDateString('it-IT',{weekday:'short', day:'2-digit', month:'short'}); }catch(e){ return iso; } }

function Login({onOk}){
  const [pw, setPw] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  async function entra(){
    if(!pw.trim()) return;
    setBusy(true); setErr('');
    try{
      const r = await callServer('apiStaffLogin', pw.trim());
      if(r.ok){ localStorage.setItem('staff_token', r.token); onOk(r.token); }
      else setErr('Password errata.');
    }catch(e){ setErr('Errore di connessione.'); }
    finally{ setBusy(false); }
  }
  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-brand">
          <div className="brand-mark">B</div>
          <div><div className="login-title">BASE — Sala</div><div className="login-sub">Vista camerieri</div></div>
        </div>
        <div className="field">
          <label>Password sala</label>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"
            autoCapitalize="none" autoCorrect="off" onKeyDown={e=>e.key==='Enter'&&entra()} />
        </div>
        <button className="btn-login" onClick={entra} disabled={busy}>
          <Icon name={busy?'loader':'lock'} />{busy?'Accesso…':'Entra'}
        </button>
        {err && <div className="login-error">{err}</div>}
      </div>
    </div>
  );
}

function App(){
  const [token, setToken] = useState(localStorage.getItem('staff_token') || '');
  const [auth, setAuth] = useState(localStorage.getItem('staff_token') ? 'ok' : 'login'); // resta loggato finché il token è valido
  const [events, setEvents] = useState([]);
  const [eventId, setEventId] = useState(null);
  const [ev, setEv] = useState(null);
  const [q, setQ] = useState('');
  const [offline, setOffline] = useState(false);

  // distingue "token non valido" (→ logout) da un errore di rete (→ resta dentro)
  function isAuthErr(e){ return e && e.message && e.message.toLowerCase().indexOf('autoriz') >= 0; }
  function handleErr(e){
    if(isAuthErr(e)){ localStorage.removeItem('staff_token'); setToken(''); setEv(null); setEventId(null); setAuth('login'); }
    else setOffline(true); // errore di rete: NON slogga, riprova al giro successivo
  }

  async function loadBootstrap(tk){
    const data = await callServer('apiGetPublicBootstrap', 'staff', tk);
    const sorted = data.events.slice().sort((a,b)=>a.date.localeCompare(b.date));
    setEvents(sorted);
    if(sorted.length){
      const today = new Date().toISOString().slice(0,10);
      const next = sorted.find(e=>e.date>=today) || sorted[sorted.length-1];
      const full = await callServer('apiGetPublicEvent', next.id, 'staff', tk);
      setEventId(next.id); setEv(full);
    }
    setOffline(false);
  }

  // primo caricamento quando si è loggati
  useEffect(()=>{
    if(auth!=='ok' || !token) return;
    let cancel=false;
    (async function(){ try{ await loadBootstrap(token); }catch(e){ if(!cancel) handleErr(e); } })();
    return ()=>{ cancel=true; };
  }, [auth, token]);

  // refresh continuo (ogni 6s): tavoli sempre aggiornati
  useEffect(()=>{
    if(auth!=='ok' || !eventId || !token) return;
    const t = setInterval(async()=>{
      try{ const full = await callServer('apiGetPublicEvent', eventId, 'staff', token); setEv(full); setOffline(false); }
      catch(e){ handleErr(e); }
    }, 6000);
    return ()=>clearInterval(t);
  }, [auth, eventId, token]);

  async function switchEvent(id){
    setQ('');
    if(id===eventId) return;
    try{ const full = await callServer('apiGetPublicEvent', id, 'staff', token); setEventId(id); setEv(full); setOffline(false); }
    catch(e){ handleErr(e); }
  }

  function onLogin(tk){ setToken(tk); setAuth('ok'); }

  if(auth==='login') return <Login onOk={onLogin} />;
  if(!ev) return (<div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'var(--text-dim)'}}><Icon name="loader" style={{fontSize:22,marginRight:8}}/>Caricamento…</div>);

  const tables = ev ? ev.tables : {};
  // raggruppa i tavoli ARRIVATI (unendo i gruppi in una card sola)
  const seen = new Set();
  const arrivedRows = [];
  ALL_TABLE_NUMS.forEach(num=>{
    const t = tables[num];
    if(!t || !t.nome || !t.arrivato || t.noShow) return;
    if(t.gruppoId){ if(seen.has(t.gruppoId)) return; seen.add(t.gruppoId); }
    const groupNums = t.gruppoId ? ALL_TABLE_NUMS.filter(n=>tables[n]&&tables[n].gruppoId===t.gruppoId).sort((a,b)=>a-b) : [num];
    const minimo = groupNums.length>1 ? groupNums.reduce((s,n)=>s+(Number(tables[n].minimo)||0),0) : t.minimo;
    const persone = (t.personeArrivate!==null && t.personeArrivate!==undefined && t.personeArrivate!=='') ? t.personeArrivate : t.persone;
    arrivedRows.push({ key:t.gruppoId||num, nums:groupNums, zone:zoneOf(groupNums[0]), nome:t.nome, persone:Number(persone)||0, minimo:Number(minimo)||0 });
  });

  const totPersone = arrivedRows.reduce((s,r)=>s+r.persone,0);
  const totMin = arrivedRows.reduce((s,r)=>s+r.minimo,0);

  const ql = q.trim().toLowerCase();
  const match = r => !ql || r.nums.join('+').includes(ql) || (r.nome && r.nome.toLowerCase().includes(ql));

  return (
    <div>
      <div className="topbar">
        <div className="brand-mark" style={{width:30,height:30,borderRadius:8,fontSize:14}}>B</div>
        <select className="event-select" value={eventId||''} onChange={e=>switchEvent(e.target.value)}>
          {events.map(e=><option key={e.id} value={e.id}>{fmtDate(e.date)}</option>)}
        </select>
        {offline && <span style={{marginLeft:'auto', fontSize:11.5, color:'var(--text-faint)', display:'flex', alignItems:'center', gap:5}}><Icon name="loader" style={{fontSize:12}}/>riconnessione…</span>}
      </div>

      <div className="searchbar" style={{paddingTop:12}}>
        <div className="search-wrap">
          <Icon name="search" />
          <input placeholder="Cerca tavolo o nome…" value={q} onChange={e=>setQ(e.target.value)} />
          {q && <button className="clear-x" onClick={()=>setQ('')}><Icon name="x" style={{fontSize:13}}/></button>}
        </div>
      </div>

      <div className="content">
        {arrivedRows.length===0 ? (
          <div className="empty"><Icon name="inbox" style={{fontSize:40}} /><div className="t">Nessun tavolo ancora arrivato</div><div className="s">Compariranno qui man mano che fanno il check-in</div></div>
        ) : ZONES.map(z=>{
          const rows = arrivedRows.filter(r=>r.zone===z.key && match(r));
          if(!rows.length) return null;
          return (
            <div key={z.key}>
              <div className="zone-title">{z.key}</div>
              <div className="grid">
                {rows.map(r=>(
                  <div className="card" key={r.key}>
                    <div className="card-top">
                      <span className="card-num">{r.nums.join(' + ')}</span>
                      <span className="card-people"><Icon name="users" style={{fontSize:12}}/>{r.persone}</span>
                    </div>
                    <div className="card-name">{r.nome}</div>
                    <div className="card-min"><Icon name="coin" style={{fontSize:14}}/>min <b>{fmtEUR(r.minimo)}</b></div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function zoneOf(num){
  for(const z of ZONES){ if(z.tables.includes(Number(num))) return z.key; }
  return ZONES[0].key;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}
</script>
</body>
</html>
